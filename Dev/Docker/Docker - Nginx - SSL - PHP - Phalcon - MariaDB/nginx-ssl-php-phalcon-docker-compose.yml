services:
  nginx:
    image: nginx:latest
    container_name: nginx-phalcon
    restart: unless-stopped
    ports:
      - 8080:8080
      - 443:443
    networks:
      - VMK_NETWORK_01
    volumes:
      - ./src:/var/www/html
      - ./docker/nginx/ssl:/etc/nginx/ssl
      - ./docker/nginx/conf.d/default.conf:/etc/nginx/conf.d/default.conf

  php:
    build: ./docker/php/
    container_name: php-phalcon
    restart: unless-stopped
    networks:
      - VMK_NETWORK_01
    volumes:
      - ./src:/var/www/html

networks:
  VMK_NETWORK_01:
    driver: bridge
    external: true

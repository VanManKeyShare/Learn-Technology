services:
  mariadb:
    image: mariadb:latest
    container_name: mariadb
    restart: always
    ports:
      - "3306:3306"
    networks:
      - VMK_NETWORK_01
    environment:
      MYSQL_ROOT_PASSWORD: mysql_roo_pwd
      MYSQL_DATABASE: mysql_db
      MYSQL_USER: mysql_user
      MYSQL_PASSWORD: mysql_pwd
    volumes:
      - mysql:/var/lib/mysql

volumes:
  mysql:

networks:
  VMK_NETWORK_01:
    external: true

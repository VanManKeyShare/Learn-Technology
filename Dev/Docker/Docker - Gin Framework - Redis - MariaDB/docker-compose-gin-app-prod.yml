services:
  gin-app-prod:
    build:
      context: .
      dockerfile: ./DockerFile.prod
    container_name: gin-app-prod
    restart: always
    ports:
      - "8080:8080"
    networks:
      - VMK_NETWORK_01
    environment:
      DB_HOST: mariadb
      DB_PORT: 3306
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: pwd_redis
      MYSQL_DATABASE: mysql_db
      MYSQL_USER: mysql_user
      MYSQL_PASSWORD: mysql_pwd
      TRUSTED_PROXIES: "172.17.0.0/16, 172.18.0.0/16, 192.168.0.0/16"

networks:
  VMK_NETWORK_01:
    external: true

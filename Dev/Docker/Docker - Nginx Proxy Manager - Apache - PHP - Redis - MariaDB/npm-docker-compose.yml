services:
  npm:
    image: jc21/nginx-proxy-manager:latest
    container_name: nginx-proxy-manager
    restart: always
    ports:
      - "80:80" # HTTP
      - "81:81" # Admin UI
      - "443:443" # HTTPS
    networks:
      - VMK_NPM_NETWORK_01
    environment:
      DB_SQLITE_FILE: "/data/database.sqlite"
    volumes:
      - ./docker/data:/data
      - ./docker/letsencrypt:/etc/letsencrypt

networks:
  VMK_NPM_NETWORK_01:
    external: true

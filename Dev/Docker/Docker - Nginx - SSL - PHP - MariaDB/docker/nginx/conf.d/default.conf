server {
	charset utf-8;

    listen 8080;
    listen 443 ssl;
    server_name localhost; # THAY THẾ BẰNG DOMAIN CỦA BẠN NẾU CÓ

    # CẤU HÌNH SSL
    ssl_certificate /etc/nginx/ssl/vmk.crt;
    ssl_certificate_key /etc/nginx/ssl/vmk.key;

    # THIẾT LẬP THƯ MỤC GỐC (DOCUMENT ROOT)
    root /var/www/html; # ĐIỀU CHỈNH ĐƯỜNG DẪN NÀY THEO CẤU TRÚC DOCKER/SERVER CỦA BẠN
    index index.php index.html;

    # CẤU HÌNH INDEX VÀ REWRITES (RẤT QUAN TRỌNG CHO PHALCON)
    # PHALCON SỬ DỤNG FRONT CONTROLLER (INDEX.PHP) VÀ CẦN REWRITE TẤT CẢ CÁC URL 
    # KHÔNG TỒN TẠI DƯỚI DẠNG FILE/THƯ MỤC VỀ INDEX.PHP ĐỂ PHALCON XỬ LÝ ROUTING.
    location / {
        # KIỂM TRA XEM FILE HOẶC THƯ MỤC CÓ TỒN TẠI KHÔNG.
        # NẾU KHÔNG TỒN TẠI (TRY_FILES), CHUYỂN YÊU CẦU VỀ INDEX.PHP.
        try_files $uri $uri/ /index.php?$query_string;
    }

    # XỬ LÝ PHP (CHUYỂN YÊU CẦU TỚI PHP-FPM)
    location ~ \.php$ {
        # BỎ QUA CÁC FILE KHÔNG TỒN TẠI
        try_files $uri = 404;

        # ĐƯỜNG DẪN TỚI PHP-FPM (THƯỜNG LÀ TÊN SERVICE/CONTAINER TRONG DOCKER COMPOSE)
        # NẾU BẠN DÙNG UNIX SOCKET: FASTCGI_PASS UNIX:/VAR/RUN/PHP-FPM.SOCK;
        # NẾU BẠN DÙNG DOCKER/TCP:
        fastcgi_pass php:9000; # THAY 'PHP' BẰNG TÊN SERVICE PHP-FPM TRONG DOCKER COMPOSE CỦA BẠN

        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        include fastcgi_params;

        # TĂNG HIỆU SUẤT BẰNG CÁCH GIỚI HẠN CÁC BIẾN FASTCGI CẦN THIẾT
        fastcgi_split_path_info ^(.+\.php)(/.+)$;
    }

    # NGĂN CHẶN TRUY CẬP CÁC FILE/THƯ MỤC NHẠY CẢM (TÙY CHỌN)
    # NGĂN TRUY CẬP VÀO CÁC THƯ MỤC CẤU HÌNH/SOURCE CODE NGOÀI PUBLIC
    location ~ /\. {
        deny all;
    }

    # NGĂN TRUY CẬP VÀO CÁC FILE CẤU HÌNH NGINX/APACHE
    location ~ /\.(ht|svn|git) {
        deny all;
    }

    # CẤU HÌNH CACHE CHO TÀI NGUYÊN TĨNH (TÙY CHỌN)
    location ~* \.(jpg|jpeg|png|gif|css|js|ico|svg|webp)$ {
        expires 30d;
        access_log off;
    }
}